<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
<img
  class="profile-image"
  src="images/profile.png"
  alt="Portrait of Dalton Horner"
/>

    <h1 class="name">Dalton Horner</h1>
    <p class="role">Frontend Developer in Training</p>
    <p class="bio">
      <p class="bio">
  Building responsive HTML & CSS projects while continuing learning
  clean, user-focused design.

</p>

    <div class="actions">
      <a href="#" class="button">Portfolio</a>
      <a href="#" class="button secondary">GitHub</a>
    </div>
  </main>
</body>
</html>
